name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout kód
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Inštalácia závislostí
      run: npm install

    - name: Build Webovej aplikácie
      run: npm run build

    - name: Pridanie čistej iOS platformy
      run: |
        npm install @capacitor/ios
        rm -rf ios
        npx cap add ios

    - name: Generovanie ikon a splash screenov
      run: |
        echo "Hľadám ikonu v priečinku assets..."
        ls -la assets/ || true
        
        PNG_FILE=$(find assets -maxdepth 1 -iname "*.png" | head -n 1)
        
        if [ -n "$PNG_FILE" ]; then
          echo "Našiel sa obrázok: $PNG_FILE. Nastavujem ako icon.png"
          cp "$PNG_FILE" assets/icon.png
          
          echo "Spúšťam generovanie ikon..."
          npx @capacitor/assets generate --ios --verbose
        else
          echo "POZOR: Žiadny PNG súbor sa nenašiel v priečinku assets!"
        fi

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Build iOS App (Nepodpísaná)
      run: |
        cd ios/App
        xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build CONFIGURATION_BUILD_DIR=$PWD/build || {
          echo "XCODEBUILD ZLYHAL! Tu je detailný log:"
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build CONFIGURATION_BUILD_DIR=$PWD/build | tail -n 50
          exit 1
        }

    - name: Vytvorenie IPA súboru
      run: |
        cd ios/App/build
        mkdir -p Payload
        mv App.app Payload/
        zip -r app-unsigned.ipa Payload

    - name: Nahranie hotového súboru (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-unsigned
        path: ios/App/build/app-unsigned.ipa
        retention-days: 5

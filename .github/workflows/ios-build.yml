name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout kód
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Zmenené na novšiu verziu

    - name: Inštalácia závislostí
      run: npm install

    - name: Build Webovej aplikácie
      run: npm run build

    - name: Pridanie iOS platformy (ak chýba)
      run: |
        if [ ! -d "ios" ]; then
          npx cap add ios
        fi

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Build iOS App (Nepodpísaná)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build CONFIGURATION_BUILD_DIR=$PWD/build || exit 1

    - name: Vytvorenie IPA súboru
      run: |
        cd ios/App/build
        mkdir Payload
        mv App.app Payload/
        zip -r app-unsigned.ipa Payload

    - name: Nahranie hotového súboru (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-unsigned
        path: ios/App/build/app-unsigned.ipa
        retention-days: 5
